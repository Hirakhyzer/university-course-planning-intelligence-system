<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-label="Advisor review workflow">
  <rect width="920" height="260" fill="#ffffff"/>
  <text x="460" y="32" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#111827">Advisor Review Workflow</text>
  <g font-family="Arial" font-size="14" fill="#111827">
    <circle cx="90" cy="120" r="48" fill="#dbeafe" stroke="#2563eb"/>
    <text x="90" y="116" text-anchor="middle" font-weight="700">Student</text><text x="90" y="136" text-anchor="middle">profile</text>
    <circle cx="250" cy="120" r="48" fill="#dcfce7" stroke="#16a34a"/>
    <text x="250" y="116" text-anchor="middle" font-weight="700">Rules</text><text x="250" y="136" text-anchor="middle">check</text>
    <circle cx="410" cy="120" r="48" fill="#fef3c7" stroke="#d97706"/>
    <text x="410" y="116" text-anchor="middle" font-weight="700">Risk</text><text x="410" y="136" text-anchor="middle">signals</text>
    <circle cx="570" cy="120" r="48" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="570" y="116" text-anchor="middle" font-weight="700">Advisor</text><text x="570" y="136" text-anchor="middle">review</text>
    <circle cx="730" cy="120" r="48" fill="#fee2e2" stroke="#dc2626"/>
    <text x="730" y="116" text-anchor="middle" font-weight="700">Student</text><text x="730" y="136" text-anchor="middle">choice</text>
  </g>
  <g stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arrow)"><path d="M138 120 H202"/><path d="M298 120 H362"/><path d="M458 120 H522"/><path d="M618 120 H682"/></g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs>
  <text x="460" y="214" text-anchor="middle" font-family="Arial" font-size="15" fill="#4b5563">Recommendations are evidence for advising conversations, not automated registration decisions.</text>
</svg>
